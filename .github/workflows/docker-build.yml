            $(printf 'ghcr.io/${{ env.repo_owner }}/dashboard@sha256:%s ' *)

      - name: Create/Update Dashboard tag
        if: github.ref == 'refs/heads/main'
        run: |
          # Delete existing tag if it exists
          if git tag -l "dashboard" | grep -q "dashboard"; then
