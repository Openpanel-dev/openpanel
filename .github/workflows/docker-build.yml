name: Docker Build and Push

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "apps/start/**"
      - "packages/**"
      - "!packages/sdks/**"
      - "**Dockerfile"
      - ".github/workflows/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      public: ${{ steps.filter.outputs.public }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          base: "main"
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - '.github/workflows/**'
            worker:
              - 'apps/worker/**'
              - 'packages/**'
              - '.github/workflows/**'
            public:
              - 'apps/public/**'
              - 'packages/**'
              - '.github/workflows/**'
            dashboard:
              - 'apps/start/**'
              - 'packages/**'
              - '.github/workflows/**'

  build-and-push-api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate short SHA
        id: short-sha
        run: |
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_DASH_REGISTRY_URL }}
          username: ${{ secrets.AZURE_DASH_REGISTRY_CLIENT_ID }}
          password: ${{ secrets.AZURE_DASH_REGISTRY_CLIENT_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.AZURE_DASH_REGISTRY_URL }}/openpanel-api:${{ steps.short-sha.outputs.sha }}
            ${{ secrets.AZURE_DASH_REGISTRY_URL }}/openpanel-api:latest
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy

  build-and-push-worker:
    needs: changes
    if: ${{ needs.changes.outputs.worker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate short SHA
        id: short-sha
        run: |
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_DASH_REGISTRY_URL }}
          username: ${{ secrets.AZURE_DASH_REGISTRY_CLIENT_ID }}
          password: ${{ secrets.AZURE_DASH_REGISTRY_CLIENT_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.AZURE_DASH_REGISTRY_URL }}/openpanel-worker:${{ steps.short-sha.outputs.sha }}
            ${{ secrets.AZURE_DASH_REGISTRY_URL }}/openpanel-worker:latest
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy

  build-and-push-dashboard:
    needs: changes
    if: ${{ needs.changes.outputs.dashboard == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate short SHA
        id: short-sha
        run: |
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_DASH_REGISTRY_URL }}
          username: ${{ secrets.AZURE_DASH_REGISTRY_CLIENT_ID }}
          password: ${{ secrets.AZURE_DASH_REGISTRY_CLIENT_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/start/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.AZURE_DASH_REGISTRY_URL }}/openpanel-dashboard:${{ steps.short-sha.outputs.sha }}
            ${{ secrets.AZURE_DASH_REGISTRY_URL }}/openpanel-dashboard:latest
          build-args: |
            NO_CLOUDFLARE=1

  deploy-dev:
    needs:
      - build-and-push-api
      - build-and-push-worker
      - build-and-push-dashboard
    if: always() && (needs.build-and-push-api.result == 'success' || needs.build-and-push-worker.result == 'success' || needs.build-and-push-dashboard.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '${{ secrets.AZURE_K8S_CEN_CREDENTIALS }}'

      - name: Set the Kubernetes context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-k8s-cen
          cluster-name: k8s-cen
        id: login

      - name: Restart API deployment
        if: ${{ needs.build-and-push-api.result == 'success' }}
        run: kubectl rollout restart deployment openpanel-api -n dev

      - name: Restart Worker StatefulSet
        if: ${{ needs.build-and-push-worker.result == 'success' }}
        run: |
          kubectl rollout restart statefulset openpanel-worker -n dev
          kubectl rollout restart deployment openpanel-worker-cron -n dev
          kubectl rollout restart deployment openpanel-worker-import -n dev

      - name: Restart Dashboard deployment
        if: ${{ needs.build-and-push-dashboard.result == 'success' }}
        run: kubectl rollout restart deployment openpanel-dashboard -n dev

      - name: Post to deployments channel
        id: slack-dev
        uses: slackapi/slack-github-action@v1.23.0
        if: always()
        with:
          channel-id: '${{ secrets.DEPLOYMENT_CHANNEL_ID }}'
          slack-message: "Deploying OpenPanel to dev : ${{ job.status }}\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.DEPLOYMENT_SLACK_BOT_TOKEN }}

  deploy-prod:
    needs:
      - build-and-push-api
      - build-and-push-worker
      - build-and-push-dashboard
      - deploy-dev
    if: always() && contains(github.event.head_commit.message, '#d2p-openpanel') && (needs.build-and-push-api.result == 'success' || needs.build-and-push-worker.result == 'success' || needs.build-and-push-dashboard.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '${{ secrets.AZURE_K8S_CEN_CREDENTIALS }}'

      - name: Set the Kubernetes context
        uses: azure/aks-set-context@v3
        with:
          resource-group: rg-k8s-cen
          cluster-name: k8s-cen
        id: login

      - name: Restart API deployment
        if: ${{ needs.build-and-push-api.result == 'success' }}
        run: kubectl rollout restart deployment openpanel-api -n prod

      - name: Restart Worker StatefulSet
        if: ${{ needs.build-and-push-worker.result == 'success' }}
        run: |
          kubectl rollout restart statefulset openpanel-worker -n prod
          kubectl rollout restart deployment openpanel-worker-cron -n prod
          kubectl rollout restart deployment openpanel-worker-import -n prod

      - name: Restart Dashboard deployment
        if: ${{ needs.build-and-push-dashboard.result == 'success' }}
        run: kubectl rollout restart deployment openpanel-dashboard -n prod

      - name: Post to deployments channel
        id: slack-prod
        uses: slackapi/slack-github-action@v1.23.0
        if: always()
        with:
          channel-id: '${{ secrets.DEPLOYMENT_CHANNEL_ID }}'
          slack-message: "Deploying OpenPanel to prod : ${{ job.status }}\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.DEPLOYMENT_SLACK_BOT_TOKEN }}
