name: Release OpenPanel

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: ${{ contains(github.event.head_commit.message, '#tag') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short SHA
        uses: benjlevesque/short-sha@v2.1
        id: short-sha
        with:
          length: 7

      - name: Get current date for versioning
        id: get_date
        run: echo "CURRENT_DATE=$(date +'%y.%m.%d')" >> $GITHUB_ENV

      - name: Determine the new tag
        id: determine_tag
        run: |
          BASE_TAG="${{ env.CURRENT_DATE }}"
          PREVIOUS_TAG=$(git tag --sort=-creatordate | head -1 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            NEW_TAG="${BASE_TAG}"
          elif [[ "$PREVIOUS_TAG" == "${BASE_TAG}" ]]; then
            NEW_TAG="${BASE_TAG}.01"
          elif [[ "$PREVIOUS_TAG" == "${BASE_TAG}."* ]]; then
            SUFFIX=$(echo "$PREVIOUS_TAG" | awk -F. '{print $NF}')
            if [[ "$SUFFIX" =~ ^[0-9]+$ ]]; then
              NEW_SUFFIX=$(printf "%02d" $((SUFFIX + 1)))
              NEW_TAG="${BASE_TAG}.${NEW_SUFFIX}"
            else
              NEW_TAG="${BASE_TAG}.01"
            fi
          else
            NEW_TAG="$BASE_TAG"
          fi

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_ENV
          echo "Creating release tag: $NEW_TAG"
          echo "Previous release tag: $PREVIOUS_TAG"

      - name: Get commits
        id: get_commits
        run: |
          set -euo pipefail
          LAST_TAGGED_COMMIT=$(git log --first-parent --grep="#tag" --pretty=format:"%H" -n 1 || true)

          if [ -z "$LAST_TAGGED_COMMIT" ]; then
            echo "No tag commit found. Cannot create release."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
            exit 0
          fi

          echo "Current tag commit: $LAST_TAGGED_COMMIT"

          PREV_TAGGED_COMMIT=$(git log --first-parent --grep="#tag" --pretty=format:"%H" -n 1 --skip=1 || true)

          if [ -n "$PREV_TAGGED_COMMIT" ]; then
            echo "Previous tag commit: $PREV_TAGGED_COMMIT"
            git log --first-parent --pretty=format:'%h|%s|%an' "$PREV_TAGGED_COMMIT".."$LAST_TAGGED_COMMIT"^ > commits.txt || true
          else
            echo "No previous tag commit found. This is the first release."
            git log --first-parent --pretty=format:'%h|%s|%an' "$LAST_TAGGED_COMMIT"^ > commits.txt || true
          fi

          if [ -s commits.txt ]; then
            echo "Collected commits:"
            cat commits.txt
          else
            echo "No commits found."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          fi

      - name: Prepare release notes and Slack payload
        if: env.SKIP_RELEASE != 'true'
        id: prepare_payload
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEW_TAG: ${{ env.NEW_TAG }}
        run: |
          set -euo pipefail
          HEADER="OpenPanel Release: ${NEW_TAG}"
          REPO="${GITHUB_REPOSITORY}"

          echo "Release notes:" > release_notes.txt

          # Filter out #tag and ci: commits, build release notes
          grep -v '^[^|]*|#tag\|^[^|]*|ci:' commits.txt > filtered_commits.txt || true

          if [ ! -s filtered_commits.txt ]; then
            echo "No valid commits for release. Skipping release creation..."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
            exit 0
          fi

          echo "Filtered commits:"
          cat filtered_commits.txt

          # Build release notes
          while IFS='|' read -r HASH MESSAGE AUTHOR; do
            echo "• $MESSAGE (by $AUTHOR, $HASH)" >> release_notes.txt
          done < filtered_commits.txt

          echo "Release notes generated successfully:"
          cat release_notes.txt

          # Build Slack blocks using jq from the commits file
          COMMIT_BLOCKS=$(jq -R -s --arg repo "$REPO" '
            split("\n") | map(select(length > 0)) | .[0:20] |
            map(split("|") | {hash: .[0], message: .[1], author: .[2]}) |
            map({
              "type": "rich_text",
              "elements": [{
                "type": "rich_text_section",
                "elements": [
                  {"type": "text", "text": "• "},
                  {"type": "text", "text": .message, "style": {"bold": true}},
                  {"type": "text", "text": " ("},
                  {"type": "link", "url": ("https://github.com/" + $repo + "/commit/" + .hash), "text": .hash[0:7]},
                  {"type": "text", "text": ", by "},
                  {"type": "text", "text": .author, "style": {"italic": true}},
                  {"type": "text", "text": ")"}
                ]
              }]
            })
          ' < filtered_commits.txt)

          COMMIT_COUNT=$(wc -l < filtered_commits.txt | tr -d ' ')

          # Build full Slack payload
          jq -n \
            --arg channel "${{ secrets.RELEASE_CHANNEL_ID }}" \
            --arg header "$HEADER" \
            --argjson blocks "$COMMIT_BLOCKS" \
            --arg fallback "${HEADER} - ${COMMIT_COUNT} commits" \
            --arg icon "https://openpanel.dev/apple-touch-icon.png" \
            --arg username "Open-panel-release-bot" \
            '{
              channel: $channel,
              icon_url: $icon,
              username: $username,
              text: $fallback,
              blocks: ([
                {"type": "header", "text": {"type": "plain_text", "text": $header}},
                {"type": "divider"}
              ] + $blocks)
            }' > slack_payload.json

          echo "Slack payload prepared: $(wc -c < slack_payload.json) bytes"
          echo "Commit count: ${COMMIT_COUNT}"

      - name: Create Release
        if: env.SKIP_RELEASE != 'true'
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: '${{ env.NEW_TAG }}'
          release_name: '${{ env.NEW_TAG }}'
          body_path: './release_notes.txt'
          draft: false
          prerelease: false

      - name: Notify Slack
        if: env.SKIP_RELEASE != 'true'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_RELEASE_BOT_TOKEN }}
          payload-file-path: slack_payload.json
