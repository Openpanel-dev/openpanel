name: Release OpenPanel

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: ${{ contains(github.event.head_commit.message, '#tag') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short SHA
        uses: benjlevesque/short-sha@v2.1
        id: short-sha
        with:
          length: 7

      - name: Get current date for versioning
        id: get_date
        run: echo "CURRENT_DATE=$(date +'%y.%m.%d')" >> $GITHUB_ENV

      - name: Determine the new tag
        id: determine_tag
        run: |
          BASE_TAG="${{ env.CURRENT_DATE }}"
          PREVIOUS_TAG=$(git tag --sort=-creatordate | head -1 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            NEW_TAG="${BASE_TAG}"
          elif [[ "$PREVIOUS_TAG" == "${BASE_TAG}" ]]; then
            NEW_TAG="${BASE_TAG}.01"
          elif [[ "$PREVIOUS_TAG" == "${BASE_TAG}."* ]]; then
            SUFFIX=$(echo "$PREVIOUS_TAG" | awk -F. '{print $NF}')
            if [[ "$SUFFIX" =~ ^[0-9]+$ ]]; then
              NEW_SUFFIX=$(printf "%02d" $((SUFFIX + 1)))
              NEW_TAG="${BASE_TAG}.${NEW_SUFFIX}"
            else
              NEW_TAG="${BASE_TAG}.01"
            fi
          else
            NEW_TAG="$BASE_TAG"
          fi

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_ENV
          echo "Creating release tag: $NEW_TAG"
          echo "Previous release tag: $PREVIOUS_TAG"

      - name: Get commits (NUL-separated, robust)
        id: get_commits
        run: |
          set -euo pipefail
          LAST_TAGGED_COMMIT=$(git log --first-parent --grep="#tag" --pretty=format:"%H" -n 1 || true)

          if [ -z "$LAST_TAGGED_COMMIT" ]; then
            echo "No tag commit found. Cannot create release."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
            exit 0
          fi

          echo "Current tag commit: $LAST_TAGGED_COMMIT"

          PREV_TAGGED_COMMIT=$(git log --first-parent --grep="#tag" --pretty=format:"%H" -n 1 --skip=1 || true)

          if [ -n "$PREV_TAGGED_COMMIT" ]; then
            echo "Previous tag commit: $PREV_TAGGED_COMMIT"
            git log --first-parent --pretty=format:'%h%x00%s%x00%an' "$PREV_TAGGED_COMMIT".."$LAST_TAGGED_COMMIT"^ -z > commits.bin || true
          else
            echo "No previous tag commit found. This is the first release."
            git log --first-parent --pretty=format:'%h%x00%s%x00%an' "$LAST_TAGGED_COMMIT"^ -z > commits.bin || true
          fi

          if [ -s commits.bin ]; then
            echo "Collected commits:"
            tr '\0' '|' < commits.bin | sed -n '1,5p' || true
          else
            echo "No commits found."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          fi

      - name: Prepare release notes and Slack payload
        if: env.SKIP_RELEASE != 'true'
        id: prepare_payload
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEW_TAG: ${{ env.NEW_TAG }}
        run: |
          set -euo pipefail
          HEADER="OpenPanel Release: ${NEW_TAG}"
          REPO="${GITHUB_REPOSITORY}"

          COMMIT_BLOCKS="[]"
          COMMIT_COUNT=0
          MAX_COMMITS=20

          echo "Release notes:" > release_notes.txt
          ANY_VALID_COMMITS=false

          if [ -s commits.bin ]; then
            while IFS= read -r -d '' HASH && \
                  IFS= read -r -d '' MESSAGE && \
                  IFS= read -r -d '' AUTHOR; do
              # Skip #tag and ci: commits
              case "$MESSAGE" in
                \#tag*|ci:*) continue ;;
              esac

              echo "• $MESSAGE (by $AUTHOR, $HASH)" >> release_notes.txt
              ANY_VALID_COMMITS=true

              if [ $COMMIT_COUNT -ge $MAX_COMMITS ]; then
                REMAINING=$(( $(tr -cd '\0' < commits.bin | wc -c) / 3 - MAX_COMMITS ))
                if [ $REMAINING -gt 0 ]; then
                  COMMIT_BLOCKS=$(echo "$COMMIT_BLOCKS" | jq --arg text "... and ${REMAINING} more commits" \
                    '. += [{"type": "section", "text": {"type": "plain_text", "text": $text}}]')
                fi
                break
              fi

              SHORT_HASH="${HASH:0:7}"
              URL="https://github.com/${REPO}/commit/${HASH}"

              COMMIT_BLOCKS=$(echo "$COMMIT_BLOCKS" | jq --arg msg "$MESSAGE" --arg hash "$SHORT_HASH" --arg author "$AUTHOR" --arg url "$URL" \
                '. += [{"type": "rich_text", "elements": [{"type": "rich_text_section", "elements": [
                  {"type": "text", "text": "• "},
                  {"type": "text", "text": $msg, "style": {"bold": true}},
                  {"type": "text", "text": " ("},
                  {"type": "link", "url": $url, "text": $hash},
                  {"type": "text", "text": ", by "},
                  {"type": "text", "text": $author, "style": {"italic": true}},
                  {"type": "text", "text": ")"}
                ]}]}]')

              COMMIT_COUNT=$((COMMIT_COUNT + 1))
            done < commits.bin
          fi

          if [ "$ANY_VALID_COMMITS" = false ]; then
            echo "No valid commits for release. Skipping release creation..."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
            exit 0
          fi

          echo "Release notes generated successfully:"
          cat release_notes.txt || true

          # Build full Slack payload
          jq -n \
            --arg channel "${{ secrets.RELEASE_CHANNEL_ID }}" \
            --arg header "$HEADER" \
            --argjson blocks "$COMMIT_BLOCKS" \
            --arg fallback "${HEADER} - ${COMMIT_COUNT} commits" \
            --arg icon "https://openpanel.dev/apple-touch-icon.png" \
            --arg username "Open-panel-release-bot" \
            '{
              channel: $channel,
              icon_url: $icon,
              username: $username,
              text: $fallback,
              blocks: ([
                {"type": "header", "text": {"type": "plain_text", "text": $header}},
                {"type": "divider"}
              ] + $blocks)
            }' > slack_payload.json

          echo "Slack payload prepared: $(wc -c < slack_payload.json) bytes"
          echo "Commit count: ${COMMIT_COUNT}"

      - name: Create Release
        if: env.SKIP_RELEASE != 'true'
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: '${{ env.NEW_TAG }}'
          release_name: '${{ env.NEW_TAG }}'
          body_path: './release_notes.txt'
          draft: false
          prerelease: false

      - name: Notify Slack
        if: env.SKIP_RELEASE != 'true'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_RELEASE_BOT_TOKEN }}
          payload-file-path: slack_payload.json
